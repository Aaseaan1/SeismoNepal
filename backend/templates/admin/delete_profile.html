<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Client Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .center-viewport { min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; }
        .form-wrap { width: 600px; max-width: 600px; margin: 32px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px 32px; text-align: center; }
        .form-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; color: #2a3342; text-align: center; }
        .form-message { font-size: 20px; color: #b91c1c; margin-bottom: 32px; font-weight: 600; }
        .btn-group { display: flex; gap: 18px; justify-content: center; margin-top: 24px; }
        .btn-submit { display: flex; align-items: center; gap: 8px; background: #b91c1c; color: #fff; border: none; border-radius: 6px; padding: 10px 22px; font-size: 17px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #991b1b; }
        .btn-cancel { display: flex; align-items: center; gap: 8px; background: #6c757d; color: #fff; border: none; border-radius: 6px; padding: 10px 22px; font-size: 17px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-cancel:hover { background: #495057; }
    </style>
    <style>
        body { background: linear-gradient(to bottom, #000000 0%, #ff0000 100%); min-height: 100vh; margin: 0; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; }
        .dashboard-navbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; background: #101722; border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 10px; padding: 18px 22px; margin-bottom: 18px; box-shadow: 0 0 10px rgba(255, 255, 255, 0.45), 0 2px 8px rgba(7, 12, 20, 0.35); }
        .navbar-brand { display: flex; align-items: center; gap: 12px; color: #f5f8ff; font-size: 24px; font-weight: 700; letter-spacing: 0.2px; }
        .navbar-brand i { color: #ff4d4d; font-size: 22px; }
        .navbar-links { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .navbar-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; text-decoration: none; color: #d9e6ff; font-size: 15px; font-weight: 700; border: 1px solid #31445f; background: rgba(255, 255, 255, 0.02); }
        .navbar-link:hover { background: rgba(35, 144, 255, 0.16); border-color: #4f9cff; color: #ffffff; }
        @media (max-width: 720px) { .dashboard-navbar { flex-direction: column; align-items: flex-start; } .navbar-links { width: 100%; } }
    </style>
</head>
<body>
    <div class="dashboard-navbar">
        <div class="navbar-brand">
            <i class="fas fa-wave-square"></i>
            <span>SeismoNepal Admin</span>
        </div>
        <div class="navbar-links">
            <a class="navbar-link" href="/admin/"><i class="fas fa-table-columns"></i><span>Dashboard</span></a>
            <a class="navbar-link" href="/admin/client-profile/"><i class="fas fa-users"></i><span>Client Info</span></a>
            <a class="navbar-link" href="/admin/earthquake-data/"><i class="fas fa-chart-line"></i><span>Earthquake Data</span></a>
            <a class="navbar-link" href="/portal/logout/"><i class="fas fa-right-from-bracket"></i><span>Logout</span></a>
        </div>
    </div>
    <div class="center-viewport">
        <div class="form-wrap">
            <div class="form-title">
                <i class="fas fa-user-xmark"></i> Delete Client Profile
            </div>
            <div class="form-message">
                Are you sure you want to delete this client profile?<br>
                <span style="font-size:16px; color:#222; font-weight:400;">This action cannot be undone.</span>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="btn-group">
                    <button type="submit" class="btn-submit"><i class="fas fa-trash"></i> Delete</button>
                    <button type="button" class="btn-cancel" onclick="window.location.href='/admin/client-profile/'"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
